<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Χρονολόγιο Αντίστασης στη Λήθη</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  .wrap { padding: 2rem; }
  .number {
    font-size: 160px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -4px;
  }
  .label {
    font-size: 32px;
    color: #666;
    margin-top: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .sub {
    font-size: 16px;
    color: #444;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }
  .message {
    font-size: 22px;
    color: #fff;
    margin-top: 60px;
    line-height: 1.6;
    max-width: 600px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="number" id="days"></div>
  <div class="label">μέρες</div>
  <div class="sub">από 7 Οκτωβρίου 2023</div>
  <div class="message">Η γενοκτονία συνεχίζεται.</div>
</div>
<script>
  const start = new Date('2023-10-07');
  const today = new Date();
  const days = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  document.getElementById('days').textContent = days;
</script>
</body>
</html>
