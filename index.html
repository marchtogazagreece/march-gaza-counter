.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.social-section { border-top: 0.5px solid #ddd; padding: 2.5rem 1rem; text-align: center; }

  { date:'2024-05-07', title:'Ισραήλ καταλαμβάνει τη διάβαση Ράφα — ολικός αποκλεισμός βοήθειας', link:'https://www.middleeasteye.net/news/israel-seizes-rafah-crossing', type:'critical' },

function buildTimeline() {
  const events = EVENTS
    .map(e => ({ ...e, date: new Date(e.date), dayOffset: Math.floor((new Date(e.date) - START_DATE) / 86400000) }))
    .filter(e => e.dayOffset >= 0)
    .sort((a,b) => a.dayOffset - b.dayOffset);

  const wrap = document.getElementById('events-wrap');
  let placed = [];
  events.forEach((ev, i) => {
    let y = ev.dayOffset * PX_PER_DAY;
    if (i > 0 && y - placed[i-1] < MIN_GAP) y = placed[i-1] + MIN_GAP;
    placed.push(y);
  });

  const totalH = placed[placed.length - 1] + 100;
  wrap.style.position = 'relative';
  wrap.style.height = totalH + 'px';
  const pauseYs = [];

  events.forEach((ev, i) => {
    const y = placed[i];
    const side = i % 2 === 0 ? 'ev-right' : 'ev-left';
    const div = document.createElement('div');
    div.className = `ev ${side}`;
    div.style.top = y + 'px';

    const dot = document.createElement('div');
    const dotClass = ev.type === 'critical' ? 'red' : ev.type === 'solidarity' ? 'green' : '';
    dot.className = 'ev-dot' + (dotClass ? ' ' + dotClass : '');
    div.appendChild(dot);

    const inner = document.createElement('div');
    inner.className = 'ev-inner';

    const dateEl = document.createElement('span');
    dateEl.className = 'ev-date';
    dateEl.textContent = ev.date.toLocaleDateString('el-GR', {day:'numeric', month:'short', year:'numeric'});
    inner.appendChild(dateEl);

    const titleEl = document.createElement('a');
    const titleClass = ev.type === 'critical' ? 'red' : ev.type === 'solidarity' ? 'green' : '';
    titleEl.className = 'ev-title' + (titleClass ? ' ' + titleClass : '');
    titleEl.href = ev.link;
    titleEl.target = '_blank';
    titleEl.rel = 'noopener noreferrer';
    titleEl.textContent = ev.title;
    inner.appendChild(titleEl);

    div.appendChild(inner);
    wrap.appendChild(div);
    if (ev.type === 'critical') pauseYs.push(y);
  });

  drawLine(totalH, pauseYs);
}

function drawLine(H, pauseYs) {
  const canvas = document.getElementById('breath-canvas');
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  let t = 0, amp = 0, targetAmp = 10, growing = true;
  // Breath cycle: ~4s in, ~4s out at 60fps
  const breathIn = 0.006;
  const breathOut = 0.004;

  function isPaused(y) { return pauseYs.some(py => Math.abs(y - py) < 22); }

  function stroke(ox, alpha, lw) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(30,25,18,${alpha})`;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let y = 0; y < H; y++) {
      const p = y / H;
      const paused = isPaused(y);
      const dist = paused ? Math.min(...pauseYs.map(py => Math.abs(y-py))) : 999;
      const la = paused ? amp * Math.max(0, dist / 22) : amp;
      const wave = la * (
        0.65 * Math.sin(p * Math.PI * 8 + t) +
        0.35 * Math.sin(p * Math.PI * 19 + t * 1.4)
      );
      const noise = (Math.random() - 0.5) * 0.8;
      const x = cx + ox + wave + noise;
      y === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, H);
    stroke(-0.7, 0.08, 0.4);
    stroke(0,    0.50, 1.0);
    stroke(0.8,  0.08, 0.4);

    t += 0.007;
    if (growing) {
      amp += (targetAmp - amp) * breathIn;
      if (Math.abs(amp - targetAmp) < 0.08) { growing = false; targetAmp = 0; }
    } else {
      amp += (targetAmp - amp) * breathOut;
      if (Math.abs(amp - targetAmp) < 0.08) { growing = true; targetAmp = 10; }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

buildTimeline();
