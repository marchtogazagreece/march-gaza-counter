<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Χρονολογιο Αντιστασης στη Ληθη — March To Gaza Greece</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: #f5f2ec; font-family: 'Barlow Condensed', sans-serif; color: #1a1a1a; }
.hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem 2rem; text-align: center; }
.brand { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #999; font-weight: 400; margin-bottom: 2rem; }
.days-big { font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px, 20vw, 160px); color: #1a1a1a; line-height: 1; letter-spacing: 2px; display: block; }
.days-sub { font-size: clamp(11px, 2.5vw, 15px); letter-spacing: 0.18em; text-transform: uppercase; color: #999; font-weight: 400; margin-top: 8px; display: block; }
.headline-big { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 7vw, 60px); color: #1a1a1a; letter-spacing: 3px; margin-top: 2rem; line-height: 1.05; }
.scroll-hint { margin-top: 3rem; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #bbb; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
.timeline-section { padding: 4rem 0 6rem; position: relative; }
.timeline-inner { position: relative; max-width: 900px; margin: 0 auto; padding: 0 1rem; }
#breath-canvas { position: absolute; left: 50%; top: 0; transform: translateX(-50%); pointer-events: none; z-index: 1; }
.events-wrap { position: relative; z-index: 2; }
.ev { display: flex; align-items: flex-start; position: absolute; width: 100%; }
.ev-left { padding-right: calc(50% + 30px); justify-content: flex-end; text-align: right; }
.ev-right { padding-left: calc(50% + 30px); text-align: left; }
.ev-dot { position: absolute; left: 50%; transform: translate(-50%, 5px); width: 7px; height: 7px; border-radius: 50%; background: #1a1a1a; z-index: 3; }
.ev-dot.red { background: #c0392b; width: 9px; height: 9px; transform: translate(-50%, 4px); }
.ev-inner { max-width: 180px; }
@media (max-width: 600px) { .ev-inner { max-width: 120px; } .ev-left { padding-right: calc(50% + 20px); } .ev-right { padding-left: calc(50% + 20px); } }
.ev-date { font-size: clamp(9px, 1.8vw, 11px); letter-spacing: 0.12em; text-transform: uppercase; color: #bbb; font-weight: 400; display: block; margin-bottom: 3px; }
.ev-title { font-size: clamp(12px, 2.2vw, 14px); font-weight: 700; color: #1a1a1a; line-height: 1.3; letter-spacing: 0.02em; text-decoration: none; display: block; transition: color 0.2s; }
.ev-title:hover { color: #555; }
.ev-title.red { color: #c0392b; }
.ev-title.red:hover { color: #a02a20; }
.social-section { border-top: 0.5px solid #ddd; padding: 2.5rem 1rem; text-align: center; }
.social-bar { display: flex; justify-content: center; gap: clamp(16px, 4vw, 36px); flex-wrap: wrap; margin-bottom: 1.5rem; }
.social-link { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; text-decoration: none; font-weight: 500; transition: color 0.2s; }
.social-link:hover { color: #1a1a1a; }
.footer-brand { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #ccc; }
.loading { text-align: center; padding: 4rem; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #bbb; }
</style>
</head>
<body>

<section class="hero">
  <div class="brand">March To Gaza Greece</div>
  <span class="days-big" id="dnum">—</span>
  <span class="days-sub">μερες γενοκτονιας — 7 Οκτ 2023</span>
  <div class="headline-big">Η ΓΕΝΟΚΤΟΝΙΑ ΣΥΝΕΧΙΖΕΤΑΙ</div>
  <div class="scroll-hint">scroll ↓</div>
</section>

<section class="timeline-section">
  <div class="timeline-inner">
    <canvas id="breath-canvas" width="40"></canvas>
    <div class="events-wrap" id="events-wrap">
      <div class="loading" id="loading">Φορτωνω γεγονοτα...</div>
    </div>
  </div>
</section>

<section class="social-section">
  <div class="social-bar">
    <a class="social-link" href="https://www.instagram.com/marchtogaza_greece/" target="_blank">Instagram</a>
    <a class="social-link" href="https://www.facebook.com/p/March-to-Gaza-Greece-61576333366153/" target="_blank">Facebook</a>
    <a class="social-link" href="https://www.tiktok.com/@marchtogazagreece" target="_blank">TikTok</a>
    <a class="social-link" href="https://www.youtube.com/channel/UCLZgJLd9KTxxM7XeTBbGmqQ" target="_blank">YouTube</a>
  </div>
  <div class="footer-brand">March To Gaza Greece</div>
</section>

<script>
const START_DATE = new Date('2023-10-07');
const PX_PER_DAY = 28;
const MIN_GAP = 56;

document.getElementById('dnum').textContent = Math.floor((new Date() - START_DATE) / 86400000);

async function loadEvents() {
  const res = await fetch('events.csv');
  const text = await res.text();
  const lines = text.trim().split('\n').slice(1);
  return lines.map(line => {
    const cols = line.split(',');
    const [d, m, y] = cols[0].trim().split('/');
    const date = new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
    const title = cols[1].trim();
    const link = cols[2] ? cols[2].trim() : null;
    const critical = cols[3] ? cols[3].trim().toUpperCase() === 'ΝΑΙ' : false;
    const dayOffset = Math.floor((date - START_DATE) / 86400000);
    return { date, dayOffset, title, link, critical };
  }).filter(e => e.dayOffset >= 0).sort((a,b) => a.dayOffset - b.dayOffset);
}

async function buildTimeline() {
  const events = await loadEvents();
  const wrap = document.getElementById('events-wrap');
  document.getElementById('loading').remove();

  let placed = [];
  events.forEach((ev, i) => {
    let y = ev.dayOffset * PX_PER_DAY;
    if (i > 0 && y - placed[i-1] < MIN_GAP) y = placed[i-1] + MIN_GAP;
    placed.push(y);
  });

  const totalH = placed[placed.length - 1] + 80;
  wrap.style.position = 'relative';
  wrap.style.height = totalH + 'px';
  const pauseYs = [];

  events.forEach((ev, i) => {
    const y = placed[i];
    const side = i % 2 === 0 ? 'ev-right' : 'ev-left';
    const div = document.createElement('div');
    div.className = `ev ${side}`;
    div.style.top = y + 'px';

    const dot = document.createElement('div');
    dot.className = 'ev-dot' + (ev.critical ? ' red' : '');
    div.appendChild(dot);

    const inner = document.createElement('div');
    inner.className = 'ev-inner';

    const dateEl = document.createElement('span');
    dateEl.className = 'ev-date';
    dateEl.textContent = ev.date.toLocaleDateString('el-GR', {day:'numeric',month:'short',year:'numeric'});
    inner.appendChild(dateEl);

    const titleEl = ev.link ? document.createElement('a') : document.createElement('span');
    titleEl.className = 'ev-title' + (ev.critical ? ' red' : '');
    if (ev.link) { titleEl.href = ev.link; titleEl.target = '_blank'; titleEl.rel = 'noopener noreferrer'; }
    titleEl.textContent = ev.title;
    inner.appendChild(titleEl);

    div.appendChild(inner);
    wrap.appendChild(div);
    if (ev.critical) pauseYs.push(y);
  });

  drawLine(totalH, pauseYs);
}

function drawLine(H, pauseYs) {
  const canvas = document.getElementById('breath-canvas');
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  let t = 0, amp = 0, targetAmp = 7, growing = true;

  function isPaused(y) { return pauseYs.some(py => Math.abs(y - py) < 20); }

  function stroke(ox, alpha, lw) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(30,25,18,${alpha})`;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let y = 0; y < H; y++) {
      const p = y / H;
      const paused = isPaused(y);
      const dist = paused ? Math.min(...pauseYs.map(py => Math.abs(y-py))) : 999;
      const la = paused ? amp * Math.max(0, dist/20) : amp;
      const wave = la * (0.7*Math.sin(p*Math.PI*10+t) + 0.3*Math.sin(p*Math.PI*23+t*1.3));
      const noise = (Math.random()-0.5)*0.7;
      const x = cx + ox + wave + noise;
      y===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,H);
    stroke(-0.5, 0.10, 0.4);
    stroke(0,    0.48, 0.9);
    stroke(0.6,  0.10, 0.4);
    t += 0.008;
    if (growing) { amp += (targetAmp-amp)*0.018; if(Math.abs(amp-targetAmp)<0.1){growing=false;targetAmp=0;} }
    else { amp += (targetAmp-amp)*0.013; if(Math.abs(amp-targetAmp)<0.1){growing=true;targetAmp=7;} }
    requestAnimationFrame(draw);
  }
  draw();
}

buildTimeline();
</script>
</body>
</html>
