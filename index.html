<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #000;
  }
  .wrap { text-align: center; padding: 1rem; }
  .number { font-size: 120px; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -2px; }
  .label { font-size: 28px; color: #aaa; margin-top: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .sub { font-size: 16px; color: #555; margin-top: 8px; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="number" id="days"></div>
  <div class="label">μέρες</div>
  <div class="sub">από 7 Οκτωβρίου 2023</div>
</div>
<script>
  const start = new Date('2023-10-07');
  const today = new Date();
  const days = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  document.getElementById('days').textContent = days;
</script>
</body>
</html>
